name: CI/CD Pipeline

on:
  push:
    branches: [ "*" ]
  pull_request:

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python
      - run: pip install flake8
      - run: flake8 api worker --exclude=__pycache__,*/site-packages/*

      # JS
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: |
          cd frontend
          npm install
          npm install eslint@8
          echo 'module.exports = {env:{node:true,es2021:true},extends:"eslint:recommended"};' > .eslintrc.cjs
          npx eslint .

      # Docker
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          ignore: DL3018


# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov fakeredis httpx

      - run: pytest --cov=api --cov-report=xml
        env:
          PYTHONPATH: .

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml


# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - run: |
          docker build -t localhost:5000/api:$TAG ./api
          docker build -t localhost:5000/worker:$TAG ./worker
          docker build -t localhost:5000/frontend:$TAG ./frontend

          docker tag localhost:5000/api:$TAG localhost:5000/api:latest
          docker tag localhost:5000/worker:$TAG localhost:5000/worker:latest
          docker tag localhost:5000/frontend:$TAG localhost:5000/frontend:latest

          docker push localhost:5000/api:$TAG
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:$TAG
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:$TAG
          docker push localhost:5000/frontend:latest


# ---------------- SECURITY ----------------
  security:
    runs-on: ubuntu-latest
    needs: build

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      # Pull images from local registry
      - run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest

      # Scan API (strict requirement: fail on CRITICAL)
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: trivy.sarif
          severity: CRITICAL
          exit-code: 1

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy.sarif


# ---------------- INTEGRATION ----------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - run: docker compose up -d --build

      - run: |
          for i in {1..30}; do
            curl -f http://localhost:8000/health && break
            sleep 2
          done

      - run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | jq -r .job_id)
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - run: |
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r .status)
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - if: always()
        run: docker compose down


# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - run: |
          docker compose up -d --build

          for i in {1..30}; do
            if curl -f http://localhost:8000/health; then
              exit 0
            fi
            sleep 2
          done

          exit 1