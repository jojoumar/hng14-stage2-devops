name: CI/CD Pipeline

on:
  push:
    branches: [ "*" ]
  pull_request:

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python lint
      - name: Install flake8
        run: pip install flake8

      - name: Lint Python
        run: flake8 api worker

      # JS lint
      - name: Install Node + eslint
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: |
          cd frontend
          npm install
          npm install eslint@8
          npx eslint .

      # Docker lint
      - name: Hadolint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
            dockerfile: api/Dockerfile
            
      - name: Hadolint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
            dockerfile: worker/Dockerfile

      - name: Hadolint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
            dockerfile: frontend/Dockerfile
            ignore: DL3018


# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Install API dependencies
        run: |
          pip install -r api/requirements-dev.txt

      - name: Install deps
        run: |
          pip install pytest pytest-cov fakeredis

      - name: Run tests
        run: |
          pytest --cov=api --cov-report=xml
        env:
          PYTHONPATH: .

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build images
        run: |
          docker build -t localhost:5000/api:$TAG ./api
          docker build -t localhost:5000/worker:$TAG ./worker
          docker build -t localhost:5000/frontend:$TAG ./frontend

      - name: Tag latest
        run: |
          docker tag localhost:5000/api:$TAG localhost:5000/api:latest
          docker tag localhost:5000/worker:$TAG localhost:5000/worker:latest
          docker tag localhost:5000/frontend:$TAG localhost:5000/frontend:latest

      - name: Push images
        run: |
          docker push localhost:5000/api:$TAG
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:$TAG
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:$TAG
          docker push localhost:5000/frontend:latest


# ---------------- SECURITY ----------------
  security:
    runs-on: ubuntu-latest
    needs: build

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Pull images from local registry
        run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest

      - name: Run Trivy scan (API)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Run Trivy scan (Worker)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:latest
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Run Trivy scan (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: "*.sarif"


# ---------------- INTEGRATION ----------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            curl -f http://localhost:3000 && break
            sleep 2
          done

      - name: Submit job via frontend
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | jq -r .job_id)
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job status
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r .status)
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v


# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling update
        run: |
          docker compose up -d

          docker run -d --name new_api -p 8001:8000 api:latest

          echo "Waiting for health..."

          for i in {1..12}; do
            if curl -f http://localhost:8001/health; then
              echo "Healthy"
              docker stop api || true
              docker rm api || true
              docker rename new_api api
              exit 0
            fi
            sleep 5
          done

          echo "Health failed — keeping old container"
          docker stop new_api || true
          docker rm new_api || true
          exit 1