
services:
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT}"
          memory: "${REDIS_MEMORY_LIMIT}"

  api:
    build: ./api
    container_name: api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - "${API_PORT}:8000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${API_CPU_LIMIT}"
          memory: "${API_MEMORY_LIMIT}"

  worker:
    build: ./worker
    container_name: worker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import redis, os; r=redis.Redis(host=os.getenv('REDIS_HOST'), port=int(os.getenv('REDIS_PORT'))); r.ping()"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${WORKER_CPU_LIMIT}"
          memory: "${WORKER_MEMORY_LIMIT}"

  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: ${API_URL}
    ports:
      - "${FRONTEND_PORT}:3000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPU_LIMIT}"
          memory: "${FRONTEND_MEMORY_LIMIT}"

networks:
  app-network:
    driver: bridge